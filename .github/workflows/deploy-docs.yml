name: Deploy VuePress Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'package.json'
      - '.github/workflows/deploy-docs.yml'
  # Allow manual trigger
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction

      - name: Generate example gallery (HTML demos)
        run: |
          mkdir -p docs/.vuepress/public/gallery
          php examples/calculator.php web > docs/.vuepress/public/gallery/calculator.html
          php examples/counter.php html > docs/.vuepress/public/gallery/counter.html
          php examples/todo.php html > docs/.vuepress/public/gallery/todo.html
          php examples/pry.php web > docs/.vuepress/public/gallery/pry.html
          php examples/showcase.php web > docs/.vuepress/public/gallery/showcase.html
          php examples/perry-demo.php web > docs/.vuepress/public/gallery/perry-demo.html

      - name: Build VuePress docs
        run: npm run docs:build
        env:
          DOCS_BASE: /perry-php/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vuepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
