function action_0() {
    state.result = "";
    if (state.display.length > 1) {
            state.display = state.display.slice(0, -1);
        if (state.typed.length > 1) {
                    state.typed = state.typed.slice(0, -1);

}

    state.result = "";
    let operators = ["+", "-", "x", "÷", "%"];
    let lastChar = state.display.slice(-1);
    if (operators.includes(lastChar)) {
            state.display = state.display.slice(0, -1);
    } else {
            state.operand1 = !!state.typed ? parseFloat(state.typed) || 0.0 : parseFloat(state.display) || 0.0;
        state.operand2 = 0;
    }
    state.operation = "%";
    state.isTyping = false;
    state.typed = "";
    state.display = state.display + "%";
    render();
}

    function action_15() {

    let lastChar = state.display.slice(-1);
    if (operators.includes(lastChar)) {

        state.operand2 = 0;
    }
    state.operation = "+";
    state.isTyping = false;
    state.typed = "";
    state.display = state.display + "+";
    render();
}
    function action_16() {
    state.result = "";
    let val = parseFloat(state.typed) || 0.0;
    if (val != 0) {
            let negVal = -val;
        let negStr = val == Math.floor(val) ? String(parseInt(negVal, 10) || 0) : String(negVal);
        state.typed = negStr;
        state.display = negStr;
    }
    render();
}
    function action_17() {
    state.result = "";
    if (state.isTyping) {
            state.display = state.display + "0";
        state.typed = state.typed + "0";
    } else {
            if (!state.operation) {
                    state.display = "0";
        } else {
                    state.display = state.display + "0";
        }
        state.typed = "0";
        state.isTyping = true;
    }
    state.operand2 = parseFloat(state.typed) || 0.0;
    render();
}
    function action_18() {
    state.result = "";
    if (state.isTyping) {
            if (!(() => { const _i = state.typed.indexOf("."); return _i === -1 ? false : _i; })()) {
                    state.display = state.display + ".";
            state.typed = state.typed + ".";
        }
    } else {
            let operators = ["+", "-", "x", "÷", "%"];
        let lastChar = state.display.slice(-1);
        if (operators.includes(lastChar)) {
                    state.display = state.display + "0.";
            state.typed = "0.";
        } else {
                    state.display = state.display + ".";
            state.typed = state.typed + ".";
        }
        state.isTyping = true;
    }
    render();
}
    function action_19() {
    if (!state.operation) {
            return;
    }
    let current = state.operand2;
    let calcResult = state.operand1;
    let isAdd = state.operation == "+";
    let isSub = state.operation == "-";
    let isMul = state.operation == "x";
    let isDiv = state.operation == "÷";
    let isMod = state.operation == "%";
    if (isAdd) {
            calcResult = state.operand1 + current;
    }
    if (isSub) {
            calcResult = state.operand1 - current;
    }
    if (isMul) {
            calcResult = state.operand1 * current;
    }
    if (isDiv && current != 0) {
            calcResult = state.operand1 / current;
    }
    if (isMod && current != 0) {
            calcResult = parseFloat(parseInt(state.operand1, 10) || 0 % parseInt(current, 10) || 0) || 0.0;
    }
    let isWhole = calcResult == Math.floor(calcResult);
    let resultStr = isWhole ? String(parseInt(calcResult, 10) || 0) : String(calcResult);
    state.result = state.display + "=";
    state.display = resultStr;
    state.operand1 = calcResult;
    state.operation = "";
    state.isTyping = false;
    state.typed = "";
    render();
